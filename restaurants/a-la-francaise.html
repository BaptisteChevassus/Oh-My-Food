<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.2.1/css/all.min.css">
    <link rel="stylesheet" href="../css/style.css">
    <title>À la française - Ohmyfood</title>
</head>
<body>
    <header class="header">
        <a href="../index.html" class="header__arrow">
            <i class="fa-solid fa-arrow-left"></i>
        </a>
        <img src="../assets/images/logo/ohmyfood.png" alt="Logo Ohmyfood" class="header__logo">
    </header>

    <main>
        <img src="../assets/images/restaurants/toa-heftiba-DQKerTsQwi0-unsplash.jpg" alt="À la française" class="hero-img">

        <section class="menu">
            <div class="container">
                <header class="menu__header">
                    <h1 class="menu__title">À la française</h1>
                    <div class="heart-btn"> 
                        <input type="checkbox" id="heart-palette" class="heart-checkbox">
                        <label for="heart-palette" class="heart-label">
                            <i class="fa-regular fa-heart card__icon card__icon--empty"></i>
                            <i class="fa-solid fa-heart card__icon card__icon--full"></i>
                        </label>
                    </div>
                </header>

                <div class="menu__grid">
                    <section class="menu__category">
                        <h2 class="menu__category-title">Entrées</h2>
    
                        <div class="menu-item menu-item--1">
                            <input type="checkbox" id="item-1" class="menu-item__checkbox">
                            <label for="item-1" class="menu-item__container">
                                <span class="menu-item__content">
                                    <span class="menu-item__title">Tartare de poulpe acidulé</span>
                                    <span class="menu-item__subtitle">Aux zestes d'orange</span>
                                </span>
                                <span class="menu-item__price">25€</span>
                                <span class="menu-item__check">
                                    <span class="menu-item__icon">
                                        <i class="fa-solid fa-check"></i>
                                    </span>
                                </span>
                            </label>
                        </div>

                        <div class="menu-item menu-item--2">
                            <input type="checkbox" id="item-2" class="menu-item__checkbox">
                            <label for="item-2" class="menu-item__container">
                                <span class="menu-item__content">
                                    <span class="menu-item__title">Velouté de légumes d'antan</span>
                                    <span class="menu-item__subtitle">Carotte, panais, topinambour</span>
                                </span>
                                <span class="menu-item__price">35€</span>
                                <span class="menu-item__check">
                                    <span class="menu-item__icon">
                                        <i class="fa-solid fa-check"></i>
                                    </span>
                                </span>
                            </label>
                        </div>

                        <div class="menu-item menu-item--3">
                            <input type="checkbox" id="item-3" class="menu-item__checkbox">
                            <label for="item-3" class="menu-item__container">
                                <span class="menu-item__content">
                                    <span class="menu-item__title">Soupe à l'oignon</span>
                                    <span class="menu-item__subtitle">Revisitée</span>
                                </span>
                                <span class="menu-item__price">40€</span>
                                <span class="menu-item__check">
                                    <span class="menu-item__icon">
                                        <i class="fa-solid fa-check"></i>
                                    </span>
                                </span>
                            </label>
                        </div>
                    </section>

                    <section class="menu__category">
                        <h2 class="menu__category-title">Plats</h2>
    
                        <div class="menu-item menu-item--4">
                            <input type="checkbox" id="item-4" class="menu-item__checkbox">
                            <label for="item-4" class="menu-item__container">
                                <span class="menu-item__content">
                                    <span class="menu-item__title">Coquilles Saint-Jacques</span>
                                    <span class="menu-item__subtitle">Accompagnées d'une purée de panais</span>
                                </span>
                                <span class="menu-item__price">40€</span>
                                <span class="menu-item__check">
                                    <span class="menu-item__icon">
                                        <i class="fa-solid fa-check"></i>
                                    </span>
                                </span>
                            </label>
                        </div>

                        <div class="menu-item menu-item--5">
                            <input type="checkbox" id="item-5" class="menu-item__checkbox">
                            <label for="item-5" class="menu-item__container">
                                <span class="menu-item__content">
                                    <span class="menu-item__title">Magret de canard</span>
                                    <span class="menu-item__subtitle">Et parmentier de pommes de terre</span>
                                </span>
                                <span class="menu-item__price">35€</span>
                                <span class="menu-item__check">
                                    <span class="menu-item__icon">
                                        <i class="fa-solid fa-check"></i>
                                    </span>
                                </span>
                            </label>
                        </div>

                        <div class="menu-item menu-item--6">
                            <input type="checkbox" id="item-6" class="menu-item__checkbox">
                            <label for="item-6" class="menu-item__container">
                                <span class="menu-item__content">
                                    <span class="menu-item__title">Pigeonneau d'Ille-et-Vilaine</span>
                                    <span class="menu-item__subtitle">Sur son lit de gnocchis aux légumes</span>
                                </span>
                                <span class="menu-item__price">44€</span>
                                <span class="menu-item__check">
                                    <span class="menu-item__icon">
                                        <i class="fa-solid fa-check"></i>
                                    </span>
                                </span>
                            </label>
                        </div>
                    </section>

                    <section class="menu__category">
                        <h2 class="menu__category-title">Desserts</h2>
    
                        <div class="menu-item menu-item--7">
                            <input type="checkbox" id="item-7" class="menu-item__checkbox">
                            <label for="item-7" class="menu-item__container">
                                <span class="menu-item__content">
                                    <span class="menu-item__title">Pétales de violettes glacés</span>
                                    <span class="menu-item__subtitle">Et purée de noisettes</span>
                                </span>
                                <span class="menu-item__price">18€</span>
                                <span class="menu-item__check">
                                    <span class="menu-item__icon">
                                        <i class="fa-solid fa-check"></i>
                                    </span>
                                </span>
                            </label>
                        </div>

                        <div class="menu-item menu-item--8">
                            <input type="checkbox" id="item-8" class="menu-item__checkbox">
                            <label for="item-8" class="menu-item__container">
                                <span class="menu-item__content">
                                    <span class="menu-item__title">Fondant au chocolat</span>
                                    <span class="menu-item__subtitle">Revisité</span>
                                </span>
                                <span class="menu-item__price">22€</span>
                                <span class="menu-item__check">
                                    <span class="menu-item__icon">
                                        <i class="fa-solid fa-check"></i>
                                    </span>
                                </span>
                            </label>
                        </div>

                        <div class="menu-item menu-item--9">
                            <input type="checkbox" id="item-9" class="menu-item__checkbox">
                            <label for="item-9" class="menu-item__container">
                                <span class="menu-item__content">
                                    <span class="menu-item__title">Millefeuille croustillant</span>
                                    <span class="menu-item__subtitle">Myrtilles et pâte d'amande</span>
                                </span>
                                <span class="menu-item__price">23€</span>
                                <span class="menu-item__check">
                                    <span class="menu-item__icon">
                                        <i class="fa-solid fa-check"></i>
                                    </span>
                                </span>
                            </label>
                        </div>
                    </section>
                    <div class="menu__order">
                        <button class="btn">Commander</button>
                    </div>
                 </div>
            </div>
        </section>
    </main>

    <footer class="footer">
        <div class="container">
            <span class="footer__logo">ohmyfood</span>
            <ul class="footer__list">
                <li class="footer__item"><a href="#" class="footer__link"><i class="fa-solid fa-utensils footer__icon"></i> Proposer un restaurant</a></li>
                <li class="footer__item"><a href="#" class="footer__link"><i class="fa-solid fa-handshake-angle footer__icon"></i> Devenir partenaire</a></li>
                <li class="footer__item"><a href="#" class="footer__link">Mentions légales</a></li>
                <li class="footer__item"><a href="mailto:contact@ohmyfood.com" class="footer__link">Contact</a></li>
            </ul>
        </div>
    </footer>

</body>
</html>
